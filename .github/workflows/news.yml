name: collect-news

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: install dependencies
        run: npm install

      - name: collect news
        run: node collectNews.js

      - name: analyze news
        run: node analyzeNews.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
