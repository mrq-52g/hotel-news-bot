name: collect-news

on:
  schedule:
    - cron: "0 6 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: install node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: install dependencies
        run: npm install

      - name: run script
        run: node collectNews.js
